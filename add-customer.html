<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Customer - NeuroPixel Admin</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="logo.png" alt="NeuroPixel Logo">
                <h3>NeuroPixel</h3>
            </div>
            <nav>
                <a href="dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a>
                <a href="add-customer.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    Add Customer
                </a>
                <a href="view-customers.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    View Customers
                </a>
            </nav>
            <button class="logout-btn" id="logoutBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
                </svg>
                Logout
            </button>
        </aside>

        <main class="main-content">
            <h1>Add New Customer</h1>
            <form id="customerForm" class="customer-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Shop Name *</label>
                        <input type="text" id="shopName" required>
                    </div>
                    <div class="form-group">
                        <label>Owner Name *</label>
                        <input type="text" id="ownerName" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phoneNumber" required pattern="[0-9]{10}">
                    </div>
                    <div class="form-group">
                        <label>Extra Phone Number</label>
                        <input type="tel" id="extraPhone" pattern="[0-9]{10}">
                    </div>
                    <div class="form-group">
                        <label>Shop Type *</label>
                        <input type="text" id="shopType" required list="shopTypeList">
                        <datalist id="shopTypeList"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Service Chosen *</label>
                        <input type="text" id="serviceChosen" required list="serviceList">
                        <datalist id="serviceList"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Location *</label>
                        <input type="text" id="location" required list="locationList">
                        <datalist id="locationList"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Budget *</label>
                        <input type="number" id="budget" required min="0">
                    </div>
                    <div class="form-group">
                        <label>Order Status *</label>
                        <select id="orderStatus" required>
                            <option value="pending">Pending</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Delivery Date</label>
                        <input type="date" id="deliveryDate">
                    </div>
                    <div class="form-group">
                        <label>Advance Received</label>
                        <input type="number" id="advanceReceived" min="0" value="0">
                    </div>
                    <div class="form-group">
                        <label>Next Payment Date</label>
                        <input type="date" id="nextPaymentDate">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Add Customer</button>
            </form>
        </main>
    </div>

    <script type="module" src="add-customer.js"></script>
</body>

</html>
