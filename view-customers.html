<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Customers - NeuroPixel Admin</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="logo.png" alt="NeuroPixel Logo">
                <h3>NeuroPixel</h3>
            </div>
            <nav>
                <a href="dashboard.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7" />
                        <rect x="14" y="3" width="7" height="7" />
                        <rect x="14" y="14" width="7" height="7" />
                        <rect x="3" y="14" width="7" height="7" />
                    </svg>
                    Dashboard
                </a>
                <a href="add-customer.html" class="nav-item">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    Add Customer
                </a>
                <a href="view-customers.html" class="nav-item active">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    View Customers
                </a>
            </nav>
            <button class="logout-btn" id="logoutBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" />
                </svg>
                Logout
            </button>
        </aside>

        <main class="main-content">
            <h1>Customer Records</h1>
            <div class="filters-container">
                <input type="text" id="searchInput" placeholder="Search customers...">
                <select id="filterShopType">
                    <option value="">All Shop Types</option>
                </select>
                <select id="filterLocation">
                    <option value="">All Locations</option>
                </select>
                <select id="filterPaymentStatus">
                    <option value="">All Payment Status</option>
                    <option value="paid">Fully Paid</option>
                    <option value="partial">Partial Payment</option>
                    <option value="pending">No Payment</option>
                </select>
                <select id="filterOrderStatus">
                    <option value="">All Order Status</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="pending">Pending</option>
                    <option value="rejected">Rejected</option>
                </select>
                <button id="exportBtn" class="btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" />
                    </svg>
                    Export
                </button>
            </div>
            <div class="table-container">
                <table id="customersTable">
                    <thead>
                        <tr>
                            <th>Shop Name</th>
                            <th>Owner</th>
                            <th>Phone</th>
                            <th>Shop Type</th>
                            <th>Service</th>
                            <th>Location</th>
                            <th>Budget</th>
                            <th>Status</th>
                            <th>Payment</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customersTableBody"></tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Customer</h2>
            <form id="editForm" class="customer-form">
                <input type="hidden" id="editId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Shop Name *</label>
                        <input type="text" id="editShopName" required>
                    </div>
                    <div class="form-group">
                        <label>Owner Name *</label>
                        <input type="text" id="editOwnerName" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="editPhoneNumber" required>
                    </div>
                    <div class="form-group">
                        <label>Extra Phone Number</label>
                        <input type="tel" id="editExtraPhone">
                    </div>
                    <div class="form-group">
                        <label>Shop Type *</label>
                        <input type="text" id="editShopType" required>
                    </div>
                    <div class="form-group">
                        <label>Service Chosen *</label>
                        <input type="text" id="editServiceChosen" required>
                    </div>
                    <div class="form-group">
                        <label>Location *</label>
                        <input type="text" id="editLocation" required>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="editAddress" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Budget *</label>
                        <input type="number" id="editBudget" required>
                    </div>
                    <div class="form-group">
                        <label>Order Status *</label>
                        <select id="editOrderStatus" required>
                            <option value="pending">Pending</option>
                            <option value="confirmed">Confirmed</option>
                            <option value="rejected">Rejected</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Delivery Date</label>
                        <input type="date" id="editDeliveryDate">
                    </div>
                    <div class="form-group">
                        <label>Next Payment Date</label>
                        <input type="date" id="editNextPaymentDate">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Update Customer</button>
            </form>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close-payment">&times;</span>
            <h2>Add Payment</h2>
            <form id="paymentForm" class="customer-form">
                <input type="hidden" id="paymentCustomerId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Payment Amount *</label>
                        <input type="number" id="paymentAmount" required min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label>Payment Type *</label>
                        <select id="paymentType" required>
                            <option value="advance">Advance Payment</option>
                            <option value="partial">Partial Payment</option>
                            <option value="final">Final Payment</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Payment Date *</label>
                        <input type="date" id="paymentDate" required>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <input type="text" id="paymentNotes" placeholder="Optional notes">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Add Payment</button>
            </form>
        </div>
    </div>

    <script type="module" src="view-customers-new.js"></script>
</body>

</html>
